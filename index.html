<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>WORD · interactive legend</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f0e8;
      font-family: 'Georgia', 'Times New Roman', 'Cormorant Garamond', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* main card – resembling the classic look */
    .game-container {
      max-width: 500px;
      width: 100%;
      background: #faf7f2;
      border-radius: 48px 48px 40px 40px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.08), 0 10px 20px rgba(0, 0, 0, 0.05);
      padding: 2rem 1.5rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(180, 160, 130, 0.25);
      position: relative;
      backdrop-filter: blur(2px);
    }

    /* title area: WORD + decorative L E G E N D */
    .title-section {
      text-align: center;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    .main-word {
      font-size: 4.8rem;
      font-weight: 500;
      letter-spacing: 12px;
      color: #2e2b26;
      text-transform: uppercase;
      line-height: 1;
      font-family: 'Times New Roman', 'Georgia', serif;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.05);
      margin-left: 8px; /* optical centering for letter-spacing */
    }

    .legend-row {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin-top: 0.2rem;
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: 5px;
      color: #4a433a;
      text-transform: uppercase;
      font-family: 'Times New Roman', 'Georgia', serif;
      opacity: 0.9;
    }

    .legend-letter {
      display: inline-block;
      transition: all 0.2s ease;
    }

    /* subtle divider */
    .divider {
      width: 70px;
      height: 2px;
      background: #d9cebc;
      margin: 0.9rem auto 1.8rem;
      border-radius: 2px;
      opacity: 0.7;
    }

    /* Grid: 6 columns for letters L E G E N D */
    .letters-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.9rem;
      margin: 0.5rem 0 1.7rem;
      width: 100%;
    }

    .letter-tile {
      width: 62px;
      height: 72px;
      background: #ffffff;
      border: 1.8px solid #cfc2ab;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 450;
      color: #2e2a24;
      text-transform: uppercase;
      background: #fffdf9;
      box-shadow: 0 5px 10px rgba(0,0,0,0.04);
      transition: all 0.18s ease;
      font-family: 'Times New Roman', 'Georgia', serif;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .letter-tile.selected {
      border-color: #b2976e;
      background: #f9f3e8;
      box-shadow: 0 0 0 3px rgba(190, 155, 100, 0.25);
      transform: scale(1.02);
    }

    .letter-tile.placed-correct {
      background: #e7decb;
      border-color: #a5906c;
      color: #2d281f;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(140, 110, 70, 0.25);
    }

    /* input row for letters */
    .word-input-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin: 0.8rem 0 1.4rem;
      flex-wrap: wrap;
    }

    .letter-box {
      width: 58px;
      height: 66px;
      background: #fefcf8;
      border: 2px dashed #cfbba0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.3rem;
      font-weight: 450;
      color: #5f5343;
      text-transform: uppercase;
      font-family: 'Times New Roman', 'Georgia', serif;
      background: #fdfaf3;
      transition: 0.15s;
    }

    .letter-box.filled {
      border: 2px solid #b7a17c;
      background: #f8f2e7;
      color: #2e281f;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .action-buttons {
      display: flex;
      gap: 1.2rem;
      margin-top: 0.6rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: #f3efe7;
      border: 1.5px solid #cfbea2;
      padding: 0.7rem 1.7rem;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 450;
      color: #3e382e;
      background: #faf7f0;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      font-family: 'Georgia', 'Times New Roman', serif;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      box-shadow: 0 3px 8px rgba(0,0,0,0.03);
    }

    .btn:hover {
      background: #f2e9db;
      border-color: #b1966f;
      color: #2b241a;
    }

    .btn:active {
      transform: scale(0.96);
      background: #e7dac5;
    }

    .message-area {
      min-height: 2.5rem;
      margin: 1rem 0 0.2rem;
      font-size: 1.15rem;
      color: #5f4e38;
      font-style: italic;
      text-align: center;
      font-weight: 430;
      letter-spacing: 0.3px;
      background: rgba(245, 240, 232, 0.7);
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
    }

    .download-btn {
      background: #dbceb6;
      border-color: #ab946f;
      color: #2d281f;
      font-weight: 500;
      margin-top: 0.5rem;
    }

    .download-btn:hover {
      background: #cfbc9a;
    }

    @media (max-width: 450px) {
      .letter-tile {
        width: 52px;
        height: 62px;
        font-size: 2.1rem;
      }
      .letter-box {
        width: 48px;
        height: 58px;
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <!-- WORD title -->
  <div class="title-section">
    <div class="main-word">WORD</div>
    <!-- L E G E N D underneath -->
    <div class="legend-row" id="legendDisplay">
      <span class="legend-letter">L</span>
      <span class="legend-letter">E</span>
      <span class="legend-letter">G</span>
      <span class="legend-letter">E</span>
      <span class="legend-letter">N</span>
      <span class="legend-letter">D</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- interactive letter tiles (the LEGEND letters to choose from) -->
  <div class="letters-grid" id="tileContainer">
    <!-- dynamically filled with L,E,G,E,N,D -->
  </div>

  <!-- Word construction row: 6 slots for LEGEND -->
  <div class="word-input-area" id="wordSlots">
    <!-- 6 boxes for letters -->
  </div>

  <div class="action-buttons">
    <button class="btn" id="clearBtn"><span>↺</span> Clear</button>
    <button class="btn" id="shuffleBtn"><span>⟳</span> Shuffle</button>
  </div>

  <div class="message-area" id="messageBox">tap letters to form LEGEND</div>

  <!-- Download button – saves the app as an HTML file -->
  <button class="btn download-btn" id="downloadAppBtn">
    <span>⬇️</span> Download App
  </button>
</div>

<script>
  (function() {
    // ----- GAME STATE -----
    const TARGET_WORD = "LEGEND"; 
    const TARGET_LETTERS = ['L', 'E', 'G', 'E', 'N', 'D'];
    
    // Current arrangement of tiles (order can be shuffled)
    let currentTiles = [...TARGET_LETTERS];
    
    // Slots: array of 6, each either empty string or a letter
    let slots = ['', '', '', '', '', ''];
    
    // Currently selected tile index (in tileContainer), -1 if none
    let selectedTileIndex = -1;
    
    // DOM elements
    const tileContainer = document.getElementById('tileContainer');
    const wordSlotsContainer = document.getElementById('wordSlots');
    const messageBox = document.getElementById('messageBox');
    const clearBtn = document.getElementById('clearBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const downloadBtn = document.getElementById('downloadAppBtn');
    const legendDisplayLetters = document.querySelectorAll('.legend-letter');
    
    // ----- HELPER: update UI completely -----
    function renderAll() {
      renderTiles();
      renderSlots();
      updateLegendHighlight();
      checkWinCondition();
    }
    
    // Render the draggable letter tiles
    function renderTiles() {
      tileContainer.innerHTML = '';
      currentTiles.forEach((letter, idx) => {
        const tileDiv = document.createElement('div');
        tileDiv.className = 'letter-tile';
        // add selected class if this tile is currently selected
        if (idx === selectedTileIndex) {
          tileDiv.classList.add('selected');
        }
        // check if this tile is already placed in any slot (visual clue)
        // We'll indicate if the tile is used (placed) by checking if it's already assigned to a slot?
        // But multiple same letters: better approach: mark tiles that are "used" 
        // We'll track placed tile indices in a set.
        const placedTileIndices = getPlacedTileIndices();
        if (placedTileIndices.has(idx)) {
          tileDiv.classList.add('placed-correct');
        }
        
        tileDiv.textContent = letter;
        tileDiv.dataset.index = idx;
        tileDiv.dataset.letter = letter;
        
        tileDiv.addEventListener('click', (e) => handleTileClick(idx));
        tileContainer.appendChild(tileDiv);
      });
    }
    
    // Returns a Set of tile indices that are currently placed in slots
    function getPlacedTileIndices() {
      const placed = new Set();
      // We need mapping: each slot holds a letter, but we must know which tile index it came from.
      // We'll use a parallel array slotTileIndex[slotPos] = tileIndex or -1
      // We'll maintain that state.
      if (!window.slotTileMap) {
        window.slotTileMap = [-1, -1, -1, -1, -1, -1];
      }
      window.slotTileMap.forEach(tileIdx => {
        if (tileIdx !== -1) placed.add(tileIdx);
      });
      return placed;
    }
    
    // Initialize slot-tile mapping if not exists
    if (!window.slotTileMap) {
      window.slotTileMap = [-1, -1, -1, -1, -1, -1];
    }
    
    // Update slotTileMap based on current slots and tile letters (complex but we manage carefully)
    function syncSlotTileMapAfterChange() {
      // This rebuilds slotTileMap by searching for each slot's letter in currentTiles,
      // avoiding duplicate tile indices. More robust: maintain assignment when placing/clearing.
      // We'll keep it consistent by updating on place/clear actions.
    }
    
    // Render the 6 word slots
    function renderSlots() {
      wordSlotsContainer.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const slotBox = document.createElement('div');
        slotBox.className = 'letter-box';
        if (slots[i] !== '') {
          slotBox.classList.add('filled');
          slotBox.textContent = slots[i];
        } else {
          slotBox.textContent = '';
        }
        // Allow clicking on a filled slot to remove that letter (return to tiles)
        slotBox.addEventListener('click', (e) => handleSlotClick(i));
        wordSlotsContainer.appendChild(slotBox);
      }
    }
    
    // Handle tile click: select or place
    function handleTileClick(tileIndex) {
      const letter = currentTiles[tileIndex];
      
      // If this tile is already placed in a slot, we might want to remove it? 
      // Better: if tile is already placed, clicking it could remove from slot (unplace).
      const placedIndices = getPlacedTileIndices();
      if (placedIndices.has(tileIndex)) {
        // Tile is already used: find which slot it occupies and clear that slot
        const slotPos = window.slotTileMap.indexOf(tileIndex);
        if (slotPos !== -1) {
          // Clear that slot
          slots[slotPos] = '';
          window.slotTileMap[slotPos] = -1;
          // Deselect any selection
          clearSelection();
          renderAll();
          return;
        }
      }
      
      // If no tile selected, select this tile (if not placed)
      if (selectedTileIndex === -1) {
        // Select this tile
        selectedTileIndex = tileIndex;
        renderAll();
        return;
      }
      
      // A tile is already selected
      if (selectedTileIndex === tileIndex) {
        // Deselect
        clearSelection();
        renderAll();
        return;
      }
      
      // Different tile selected: we could swap selection or place the previously selected?
      // Better UX: If another tile selected, we deselect previous and select new one.
      // But also allow placing the selected tile into empty slot by clicking slot? We'll keep selection.
      // So just change selection to new tile.
      selectedTileIndex = tileIndex;
      renderAll();
      return;
    }
    
    // Handle clicking on a slot box
    function handleSlotClick(slotIndex) {
      // If slot has a letter, remove it (return tile to pool)
      if (slots[slotIndex] !== '') {
        // Find tile index that occupies this slot
        const tileIdx = window.slotTileMap[slotIndex];
        // Clear slot
        slots[slotIndex] = '';
        if (tileIdx !== -1) {
          window.slotTileMap[slotIndex] = -1;
        }
        // Also clear selection if any
        clearSelection();
        renderAll();
        return;
      }
      
      // Slot is empty: try to place the currently selected tile here
      if (selectedTileIndex === -1) {
        messageBox.textContent = 'Select a letter tile first';
        return;
      }
      
      // Check if selected tile is already placed (shouldn't happen if we prevent, but just in case)
      if (getPlacedTileIndices().has(selectedTileIndex)) {
        messageBox.textContent = 'That tile is already used';
        clearSelection();
        renderAll();
        return;
      }
      
      // Place the selected tile into this empty slot
      const letterToPlace = currentTiles[selectedTileIndex];
      slots[slotIndex] = letterToPlace;
      window.slotTileMap[slotIndex] = selectedTileIndex;
      
      // Clear selection after placement
      clearSelection();
      renderAll();
    }
    
    function clearSelection() {
      selectedTileIndex = -1;
    }
    
    // Clear all slots
    function clearAllSlots() {
      slots = ['', '', '', '', '', ''];
      window.slotTileMap = [-1, -1, -1, -1, -1, -1];
      clearSelection();
      renderAll();
      messageBox.textContent = 'Cleared. Build LEGEND';
    }
    
    // Shuffle the tiles (only unplaced tiles? Better shuffle all tiles but maintain placed assignments?)
    // To keep it intuitive: Shuffle rearranges tile order, but placed letters remain in slots.
    // However, placed tiles correspond to tile indices; shuffling changes indices -> breaks mapping.
    // Simplest: Shuffle only allowed when no tiles are placed? Or reset placement on shuffle.
    // Good UX: Shuffle clears all slots and shuffles all tiles fresh.
    function shuffleTiles() {
      // Clear all slots first
      slots = ['', '', '', '', '', ''];
      window.slotTileMap = [-1, -1, -1, -1, -1, -1];
      clearSelection();
      
      // Fisher–Yates shuffle on currentTiles
      for (let i = currentTiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentTiles[i], currentTiles[j]] = [currentTiles[j], currentTiles[i]];
      }
      renderAll();
      messageBox.textContent = 'Tiles shuffled. Form LEGEND';
    }
    
    // Check win condition
    function checkWinCondition() {
      const formedWord = slots.join('');
      if (formedWord === TARGET_WORD) {
        messageBox.textContent = '✨ Perfect! You formed LEGEND ✨';
        // Additional celebration: briefly change legend color
        legendDisplayLetters.forEach(span => {
          span.style.color = '#b3925c';
          span.style.fontWeight = '500';
        });
        setTimeout(() => {
          legendDisplayLetters.forEach(span => {
            span.style.color = '#4a433a';
            span.style.fontWeight = '400';
          });
        }, 1000);
      } else if (formedWord.length === 6 && formedWord !== TARGET_WORD) {
        messageBox.textContent = 'Not quite LEGEND. Keep trying.';
      } else if (slots.some(s => s !== '')) {
        messageBox.textContent = 'Building...';
      } else {
        messageBox.textContent = 'tap letters to form LEGEND';
      }
    }
    
    function updateLegendHighlight() {
      // Reset all legend letters style
      legendDisplayLetters.forEach(span => {
        span.style.color = '#4a433a';
        span.style.fontWeight = '400';
      });
      // Highlight letters that are correctly placed in matching positions?
      // optional: show which position is correct
      for (let i = 0; i < 6; i++) {
        if (slots[i] === TARGET_LETTERS[i]) {
          if (legendDisplayLetters[i]) {
            legendDisplayLetters[i].style.color = '#b3925c';
            legendDisplayLetters[i].style.fontWeight = '500';
          }
        }
      }
    }
    
    // Reset/initialize game
    function resetGame() {
      currentTiles = [...TARGET_LETTERS];
      slots = ['', '', '', '', '', ''];
      window.slotTileMap = [-1, -1, -1, -1, -1, -1];
      clearSelection();
      renderAll();
      messageBox.textContent = 'tap letters to form LEGEND';
    }
    
    // Event Listeners
    clearBtn.addEventListener('click', clearAllSlots);
    shuffleBtn.addEventListener('click', shuffleTiles);
    
    // Download function: create HTML file and trigger download
    function downloadApp() {
      // Get the whole HTML content of the page
      const doctype = '<!DOCTYPE html>\n';
      const html = document.documentElement.outerHTML;
      
      // Create a Blob
      const blob = new Blob([doctype + html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = 'WORD_LEGEND_game.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      messageBox.textContent = '📥 App downloaded! Open the file.';
      setTimeout(() => {
        if (messageBox.textContent.includes('downloaded')) {
          messageBox.textContent = 'tap letters to form LEGEND';
        }
      }, 2500);
    }
    
    downloadBtn.addEventListener('click', downloadApp);
    
    // Initial render
    resetGame();
    
    // Additional: ensure legend letters are clickable? Not needed, but nice.
    // Also make legend display interactive? We'll keep decorative.
  })();
</script>
</body>
</html>
