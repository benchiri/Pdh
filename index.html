                    </div>

                    <div className="flex items-center gap-4 hover:text-purple-600 transition-colors cursor-pointer">
                      <div className="bg-purple-100 p-3 rounded-full">

                    <div className="flex items-center gap-4">

                    <button

                <motion.div
                  initial={{ scale: 0.9, opacity: 0 }}
                  animate={{ scale: 1, opacity: 1 }}
                  exit={{ scale: 0.9, opacity: 0 }}

                      <label className="block text-sm font-medium mb-2">Package</label>
                      <select className="w-full border rounded-lg p-3">
                        <option>Wedding Shoot - KSh 25,000</option>
                        <option>Birthday Shoot - KSh 8,000</option>
                        <option>Business Promo - KSh 15,000</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium mb-2">Date</label>
                      <input type="date" className="w-full border rounded-lg p-3" />

                    <div>
                      <label className="block text-sm font-medium mb-2">Location</label>
                      <select className="w-full border rounded-lg p-3">

                        <option>Mombasa</option>
                        <option>Kisumu</option>
                        <option>Nakuru</option>
                        <option>Other</option>

                    <div>
                      <label className="block text-sm font-medium mb-2">Message</label>
                      <textarea className="w-full border rounded-lg p-3" rows={3} placeholder="Tell us about your event..."></textarea>
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <button 
                      className="btn btn-primary flex-1"
                      onClick={() => {
                        handleBooking(selectedPackage);
                        setShowBookingModal(false);
                      }}
                    >
                      Book Now
                    </button>
                    <button className="btn btn-outline flex-1" onClick={() => setShowBookingModal(false)}>
                      Cancel
                    </button>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Footer */}
          <footer className="bg-gray-900 text-white py-12">
            <div className="max-w-7xl mx-auto px-6">
              <div className="grid md:grid-cols-3 gap-8 mb-8">
                <div>
                  <div className="flex items-center gap-2 mb-4">
                    <Camera />
                    <span className="text-xl font-bold">LensCraft Studio</span>
                  </div>
                  <p className="text-gray-400">Professional Photography & Videography Directory</p>
                </div>
                <div>
                  <h4 className="font-semibold mb-4">Quick Links</h4>

                    <a href="#services" className="block hover:text-white">Services</a>

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PhotoShotBusinessApp />);
