<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>WORD CIRCLE · unlimited levels</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5efe2;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: radial-gradient(circle at 30% 20%, #f3ede1, #e5d9c4);
    }

    .app-container {
      max-width: 520px;
      width: 100%;
      background: rgba(252, 248, 240, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 70px;
      box-shadow: 0 30px 55px rgba(0,0,0,0.1);
      padding: 1.8rem 1.5rem 2rem;
      border: 1px solid rgba(190, 160, 110, 0.35);
      position: relative;
    }

    /* Pages */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .page.active {
      display: flex;
    }

    /* Menu page */
    .menu-title {
      font-size: 4rem;
      letter-spacing: 12px;
      color: #3f3527;
      margin: 1rem 0 0.5rem;
      font-weight: 500;
    }
    .menu-sub {
      font-size: 1.6rem;
      letter-spacing: 8px;
      color: #6b5c46;
      margin-bottom: 2rem;
    }

    .level-info {
      background: #f8f2e7;
      padding: 0.8rem 2.5rem;
      border-radius: 3rem;
      font-size: 1.6rem;
      margin: 1rem 0;
      border: 1px solid #cfbc9a;
      color: #4d3f2b;
    }

    .circle-preview {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #fefcf7;
      margin: 1rem 0;
      box-shadow: 0 10px 20px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #b3925c;
      border: 2px dashed #cfbc9a;
    }

    .btn {
      background: #f5efe4;
      border: 1.5px solid #cfbc9a;
      padding: 0.7rem 2rem;
      border-radius: 3rem;
      font-size: 1.2rem;
      font-weight: 450;
      color: #3d3529;
      background: #f9f4ea;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Georgia', serif;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      margin: 0.4rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .btn:hover {
      background: #efe2ce;
      border-color: #b99b6c;
    }
    .btn:active {
      transform: scale(0.96);
    }

    .music-toggle {
      background: #e7dac5;
      border-color: #b3925c;
    }

    /* Game page */
    .game-header {
      display: flex;
      justify-content: space-between;
      width: 100%;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .level-badge {
      background: #e7d9c2;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 500;
    }

    .word-title {
      font-size: 3.2rem;
      letter-spacing: 10px;
      color: #3f3527;
      font-weight: 500;
    }
    .legend-sub {
      font-size: 1.5rem;
      letter-spacing: 7px;
      color: #6b5c46;
      margin-bottom: 0.8rem;
    }

    .circle-container {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 0.8rem 0;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 380px;
      height: auto;
      aspect-ratio: 1/1;
      border-radius: 50%;
      background: #fefcf7;
      box-shadow: 0 15px 30px rgba(100,70,30,0.1), inset 0 0 20px rgba(210,180,120,0.25);
      touch-action: none;
      cursor: pointer;
    }

    .word-display {
      margin: 0.8rem 0;
      font-size: 2.2rem;
      letter-spacing: 4px;
      min-height: 3.2rem;
      background: #faf5ec;
      padding: 0.2rem 2rem;
      border-radius: 3rem;
      color: #4b3c28;
      border: 1px dashed #cbb594;
      text-transform: uppercase;
    }

    .button-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin: 0.5rem 0;
    }

    .message {
      font-style: italic;
      color: #6f5e47;
      margin: 0.4rem 0;
      min-height: 1.6rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- PAGE 1: MENU / LEVEL SELECT -->
  <div class="page active" id="menuPage">
    <div class="menu-title">WORD</div>
    <div class="menu-sub">L E G E N D</div>
    <div class="circle-preview">🌀</div>
    <div class="level-info" id="levelDisplayMenu">Level 1</div>
    <button class="btn" id="playBtn">▶ Play</button>
    <button class="btn" id="nextLevelBtnMenu">⏭ Next Level</button>
    <button class="btn music-toggle" id="musicToggleMenu">🎵 Music On</button>
    <p style="margin-top:1rem; color:#5f4e38;">unlimited levels · finger connect</p>
  </div>

  <!-- PAGE 2: GAME PAGE -->
  <div class="page" id="gamePage">
    <div class="game-header">
      <span class="level-badge" id="levelBadge">Level 1</span>
      <button class="btn" id="backToMenuBtn" style="padding:0.4rem 1.2rem;">☰ Menu</button>
    </div>
    <div class="word-title">WORD</div>
    <div class="legend-sub">L E G E N D</div>

    <div class="circle-container">
      <canvas id="letterCanvas" width="400" height="400" aria-label="Circle of letters"></canvas>
    </div>

    <div class="word-display" id="formedWordDisplay">·······</div>

    <div class="button-row">
      <button class="btn" id="shuffleBtn"><span>⟳</span> Shuffle</button>
      <button class="btn" id="clearBtn"><span>↺</span> Clear</button>
    </div>
    <button class="btn music-toggle" id="musicToggleGame">🎵 Music On</button>
    <button class="btn" id="nextLevelBtnGame">⏭ Next Level</button>
    <div class="message" id="messageBox">drag finger across letters</div>
    <button class="btn" id="downloadBtn" style="margin-top:0.5rem;">⬇️ Download App</button>
  </div>
</div>

<script>
  (function() {
    // ----- AUDIO ENGINE (Web Audio API) -----
    let audioCtx = null;
    let musicGain = null;
    let musicOscillators = [];
    let musicPlaying = true;
    let currentMusicNoteIndex = 0;
    let musicInterval = null;
    
    // Simple melody notes (frequencies in Hz) – gentle ambient
    const melodyNotes = [262, 294, 330, 349, 392, 349, 330, 294]; // C D E F G F E D
    const noteDuration = 400; // ms per note
    
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        musicGain = audioCtx.createGain();
        musicGain.gain.value = 0.12;
        musicGain.connect(audioCtx.destination);
      } catch (e) {
        console.log("Audio not supported");
        musicPlaying = false;
      }
    }
    
    function playTone(freq, duration, type = 'sine', vol = 0.15) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }
    
    function playSelectSound() {
      playTone(520, 0.1, 'sine', 0.1);
    }
    
    function playSuccessSound() {
      if (!audioCtx) return;
      playTone(660, 0.15, 'triangle', 0.2);
      setTimeout(() => playTone(880, 0.2, 'triangle', 0.2), 150);
    }
    
    function startMusic() {
      if (!audioCtx || !musicPlaying) return;
      stopMusic();
      currentMusicNoteIndex = 0;
      function playNextNote() {
        if (!musicPlaying || !audioCtx) {
          stopMusic();
          return;
        }
        const note = melodyNotes[currentMusicNoteIndex % melodyNotes.length];
        playTone(note, 0.3, 'sine', 0.08);
        currentMusicNoteIndex++;
      }
      playNextNote();
      musicInterval = setInterval(playNextNote, noteDuration);
    }
    
    function stopMusic() {
      if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null;
      }
    }
    
    function toggleMusic() {
      if (!audioCtx) {
        initAudio();
        if (audioCtx) {
          musicPlaying = true;
          startMusic();
          updateMusicButtons();
          return;
        }
      }
      musicPlaying = !musicPlaying;
      if (musicPlaying) {
        startMusic();
      } else {
        stopMusic();
      }
      updateMusicButtons();
    }
    
    function updateMusicButtons() {
      const status = musicPlaying ? '🎵 Music On' : '🔇 Music Off';
      document.getElementById('musicToggleMenu').textContent = status;
      document.getElementById('musicToggleGame').textContent = status;
    }
    
    // ----- GAME LOGIC -----
    const TARGET_WORD = "LEGEND";
    const BASE_LETTERS = ['L', 'E', 'G', 'E', 'N', 'D'];
    
    let currentLevel = 1;
    let circleLetters = [...BASE_LETTERS];
    let letterPositions = [];
    let selectedIndices = [];
    let currentWord = '';
    let isDrawing = false;
    let canvasRect = null;
    
    const canvas = document.getElementById('letterCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI elements
    const formedWordDisplay = document.getElementById('formedWordDisplay');
    const messageBox = document.getElementById('messageBox');
    const levelBadge = document.getElementById('levelBadge');
    const levelDisplayMenu = document.getElementById('levelDisplayMenu');
    
    // Pages
    const menuPage = document.getElementById('menuPage');
    const gamePage = document.getElementById('gamePage');
    
    function updateLevelDisplay() {
      levelBadge.textContent = `Level ${currentLevel}`;
      levelDisplayMenu.textContent = `Level ${currentLevel}`;
    }
    
    // Generate harder letters for higher levels (unlimited progression)
    function generateLevelLetters(level) {
      // Start with base letters, then add variations/shuffles that make it harder
      let letters = [...BASE_LETTERS];
      
      // For levels > 1, we introduce controlled difficulty:
      // - shuffle more aggressively
      // - sometimes duplicate letters to confuse (but keep target solvable)
      if (level >= 3) {
        // Add extra decoy letters? No, we keep exactly 6 letters for LEGEND.
        // Instead, we ensure the arrangement is tricky.
        // Use Fisher-Yates with seed based on level for consistency?
        // We'll just shuffle randomly; unlimited levels just reshuffle.
      }
      
      // Shuffle letters based on level seed for variation
      const shuffled = [...letters];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
    
    function loadLevel(level) {
      currentLevel = level;
      circleLetters = generateLevelLetters(level);
      clearSelection();
      computeLetterPositions();
      drawCircle();
      updateLevelDisplay();
      messageBox.textContent = 'drag finger across letters';
    }
    
    function nextLevel() {
      currentLevel++;
      loadLevel(currentLevel);
      if (musicPlaying) playSelectSound();
    }
    
    function computeLetterPositions() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = Math.min(canvas.width, canvas.height) * 0.38;
      const count = circleLetters.length;
      letterPositions = [];
      const startAngle = -Math.PI / 2;
      for (let i = 0; i < count; i++) {
        const angle = startAngle + (i * 2 * Math.PI / count);
        const x = centerX + radius * Math.cos(angle);
        const y = centerY + radius * Math.sin(angle);
        letterPositions.push({ x, y, letter: circleLetters[i], index: i });
      }
    }
    
    function drawCircle() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (letterPositions.length === 0) computeLetterPositions();
      
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // faint ring
      ctx.beginPath();
      ctx.arc(centerX, centerY, Math.min(canvas.width, canvas.height) * 0.42, 0, 2*Math.PI);
      ctx.strokeStyle = '#dacdb8';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // connection lines
      if (selectedIndices.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = '#b3925c';
        ctx.lineWidth = 3.8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = '#c9ad7a';
        ctx.shadowBlur = 8;
        const firstPos = letterPositions[selectedIndices[0]];
        ctx.moveTo(firstPos.x, firstPos.y);
        for (let i = 1; i < selectedIndices.length; i++) {
          const pos = letterPositions[selectedIndices[i]];
          ctx.lineTo(pos.x, pos.y);
        }
        ctx.stroke();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
      }
      
      // letter nodes
      letterPositions.forEach((pos, idx) => {
        const isSelected = selectedIndices.includes(idx);
        if (isSelected) {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, 28, 0, 2*Math.PI);
          ctx.fillStyle = '#f3e7d3';
          ctx.shadowBlur = 14;
          ctx.shadowColor = '#c9af7c';
          ctx.fill();
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
        }
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 25, 0, 2*Math.PI);
        ctx.fillStyle = isSelected ? '#f7efdf' : '#fffef9';
        ctx.fill();
        ctx.strokeStyle = isSelected ? '#b3925c' : '#cfc0a6';
        ctx.lineWidth = 2.2;
        ctx.stroke();
        ctx.font = 'bold 22px "Times New Roman", "Georgia", serif';
        ctx.fillStyle = '#3e3629';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pos.letter, pos.x, pos.y);
      });
      
      if (currentWord.length > 0) {
        ctx.font = 'italic 18px "Georgia", serif';
        ctx.fillStyle = '#5c4b31';
        ctx.fillText(currentWord, centerX, centerY + 4);
      }
    }
    
    function updateWordFromSelection() {
      currentWord = selectedIndices.map(i => circleLetters[i]).join('');
      formedWordDisplay.textContent = currentWord || '·······';
      
      if (currentWord === TARGET_WORD) {
        messageBox.textContent = '🌟 LEGEND! Level complete! 🌟';
        formedWordDisplay.style.color = '#b3925c';
        if (musicPlaying) playSuccessSound();
      } else if (currentWord.length === TARGET_WORD.length && currentWord !== TARGET_WORD) {
        messageBox.textContent = 'Not LEGEND. Try different path.';
        formedWordDisplay.style.color = '#4b3c28';
      } else if (currentWord.length > 0) {
        messageBox.textContent = 'keep dragging...';
        formedWordDisplay.style.color = '#4b3c28';
      } else {
        messageBox.textContent = 'drag finger across letters';
        formedWordDisplay.style.color = '#4b3c28';
      }
    }
    
    function clearSelection() {
      selectedIndices = [];
      currentWord = '';
      updateWordFromSelection();
      drawCircle();
    }
    
    function shuffleLetters() {
      for (let i = circleLetters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [circleLetters[i], circleLetters[j]] = [circleLetters[j], circleLetters[i]];
      }
      clearSelection();
      computeLetterPositions();
      drawCircle();
      messageBox.textContent = 'letters shuffled';
      if (musicPlaying) playSelectSound();
    }
    
    function getLetterIndexFromPoint(clientX, clientY) {
      if (!canvasRect) canvasRect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / canvasRect.width;
      const scaleY = canvas.height / canvasRect.height;
      const canvasX = (clientX - canvasRect.left) * scaleX;
      const canvasY = (clientY - canvasRect.top) * scaleY;
      for (let i = 0; i < letterPositions.length; i++) {
        const dist = Math.hypot(canvasX - letterPositions[i].x, canvasY - letterPositions[i].y);
        if (dist <= 30) return i;
      }
      return -1;
    }
    
    function onPointerDown(e) {
      e.preventDefault();
      initAudio();
      canvasRect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const hitIndex = getLetterIndexFromPoint(clientX, clientY);
      selectedIndices = [];
      if (hitIndex !== -1) {
        selectedIndices.push(hitIndex);
        isDrawing = true;
        if (musicPlaying) playSelectSound();
      } else {
        isDrawing = false;
      }
      updateWordFromSelection();
      drawCircle();
    }
    
    function onPointerMove(e) {
      e.preventDefault();
      if (!isDrawing) return;
      canvasRect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const hitIndex = getLetterIndexFromPoint(clientX, clientY);
      if (hitIndex !== -1) {
        const lastIndex = selectedIndices.length > 0 ? selectedIndices[selectedIndices.length-1] : -1;
        if (hitIndex !== lastIndex) {
          const alreadyIn = selectedIndices.includes(hitIndex);
          if (alreadyIn) {
            if (selectedIndices.length >= 2 && selectedIndices[selectedIndices.length-2] === hitIndex) {
              selectedIndices.pop();
            }
          } else {
            selectedIndices.push(hitIndex);
            if (musicPlaying) playSelectSound();
          }
        }
      }
      updateWordFromSelection();
      drawCircle();
    }
    
    function onPointerUp(e) {
      e.preventDefault();
      isDrawing = false;
      drawCircle();
      if (currentWord === TARGET_WORD) {
        messageBox.textContent = '🎉 LEGEND! Tap Next Level!';
      }
    }
    
    function bindEvents() {
      canvas.addEventListener('touchstart', onPointerDown, { passive: false });
      canvas.addEventListener('touchmove', onPointerMove, { passive: false });
      canvas.addEventListener('touchend', onPointerUp);
      canvas.addEventListener('touchcancel', onPointerUp);
      canvas.addEventListener('mousedown', onPointerDown);
      window.addEventListener('mousemove', (e) => {
        if (isDrawing && e.buttons === 1) onPointerMove(e);
      });
      window.addEventListener('mouseup', () => {
        if (isDrawing) { isDrawing = false; drawCircle(); }
      });
    }
    
    // Page navigation
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (pageId === 'gamePage') {
        canvasRect = canvas.getBoundingClientRect();
        drawCircle();
      }
    }
    
    // Initialize everything
    function init() {
      initAudio();
      if (musicPlaying) startMusic();
      updateMusicButtons();
      computeLetterPositions();
      drawCircle();
      bindEvents();
      updateLevelDisplay();
      
      // Menu buttons
      document.getElementById('playBtn').addEventListener('click', () => {
        showPage('gamePage');
        loadLevel(currentLevel);
      });
      document.getElementById('nextLevelBtnMenu').addEventListener('click', () => {
        nextLevel();
      });
      document.getElementById('musicToggleMenu').addEventListener('click', toggleMusic);
      
      // Game buttons
      document.getElementById('backToMenuBtn').addEventListener('click', () => {
        showPage('menuPage');
      });
      document.getElementById('shuffleBtn').addEventListener('click', shuffleLetters);
      document.getElementById('clearBtn').addEventListener('click', () => {
        clearSelection();
        messageBox.textContent = 'selection cleared';
      });
      document.getElementById('musicToggleGame').addEventListener('click', toggleMusic);
      document.getElementById('nextLevelBtnGame').addEventListener('click', () => {
        nextLevel();
        messageBox.textContent = `Level ${currentLevel} · drag finger`;
      });
      document.getElementById('downloadBtn').addEventListener('click', () => {
        const doctype = '<!DOCTYPE html>\n';
        const html = document.documentElement.outerHTML;
        const blob = new Blob([doctype + html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'WORD_circle_unlimited.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        messageBox.textContent = '📥 App downloaded!';
      });
      
      window.addEventListener('resize', () => {
        canvasRect = canvas.getBoundingClientRect();
        drawCircle();
      });
    }
    
    init();
  })();
</script>
</body>
</html>
